<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Test Home</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 40px; }
      button { margin: 8px; padding: 12px 20px; }
    </style>
  </head>
  <body>
    <h1>Home</h1>
    <button id="novice">Novice</button>
    <button id="intermediate">Intermediate</button>
    <button id="expert">Expert</button>
    <script>
      document.getElementById('novice').addEventListener('click', () => {
        document.body.dataset.last = 'novice';
      });
      document.getElementById('intermediate').addEventListener('click', () => {
        document.body.dataset.last = 'intermediate';
      });
      document.getElementById('expert').addEventListener('click', () => {
        document.body.dataset.last = 'expert';
      });
    </script>
  </body>
</html>
